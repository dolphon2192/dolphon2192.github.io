    .recipe-grid {
        display: flex;      /* 横並びにする指示 */
        flex-wrap: wrap;    /* 画面幅が狭くなったら折り返す */
        gap: 10px;          /* カード同士の隙間 */
        padding: 20px;
        justify-content: left;
    }

    .recipe-card {
        position: relative; /* 日付の位置の基準にする */
        border: 1px solid #ddd;
        border-radius: 8px;
        width: 150px;
        overflow: hidden;
        transition: transform 0.2s;
    }

    .recipe-card:hover {
        transform: translateY(-5px);
    }

    .recipe-card a { text-decoration: none; color: #333; }

    .thumbnail-wrapper {
        width: 100%;
        height: 120px; /* ここで「画像エリア」の高さを全カード共通で固定します */
        display: flex;
        align-items: center; /* 画像が枠より小さい場合、上下中央に配置 */
        justify-content: center;
        background-color: #f9f9f9; /* 画像が小さい時の余白の色 */
        overflow: hidden;    /* 万が一はみ出してもカットする */
        position: relative;
        /* 画像と文字エリアの間に隙間を作らせない */
        line-height: 0;
        font-size: 0;
    }

    .thumbnail {
        max-width: 100%;     /* 親の幅を超えない */
        max-height: 100%;    /* 親の高さを絶対に超えない */
        object-fit: contain; 
        /* 余白が目立つ場合は背景色をつけると綺麗です */
        display: block;      /* ★画像の下に生まれる謎の隙間（数px）を消します */
        margin: 0;
        background-color: #f9f9f9; 
    }

    .card-body {
        padding: 10px 10px 0px 10px;
        min-height: 2.6em; /* 2行分の高さを確保（1.6行分 × 2） */
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* 上揃えにする */
        margin: 0;           /* 外側の余白をリセット */
    }

    .card-date {
        font-size: 11px;    /* 日付は小さめに */
        color: #888;        /* 色を薄くして控えめに */
        margin-bottom: 4px; /* タイトルとの隙間 */
    }

    .card-date-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(0, 0, 0, 0.6); /* 黒の半透明背景 */
        color: #fff;
        font-weight: bold;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
        z-index: 10; /* 画像より上に表示 */
    }

    .card-title {
        font-size: 14px;
        font-weight: bold;
        color: #333;
        line-height: 1.4; /* 行間を一定にする */
        margin: 0;
    }

</style>
